commit_message = "add D3 projection and Natural Earth reference docs"
files.create = [
  "packages/geospatial-skills/skills/d3-cartography/references/d3-projections.md",
  "packages/geospatial-skills/skills/d3-cartography/references/natural-earth-data.md",
