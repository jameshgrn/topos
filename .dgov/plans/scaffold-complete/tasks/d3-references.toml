[tasks.write]
summary = "Add D3 projection and Natural Earth reference docs"
prompt = """
Orient:
- Read packages/geospatial-skills/skills/d3-cartography/SKILL.md for context.
- The SKILL.md references two files that don't exist yet: references/d3-projections.md and references/natural-earth-data.md.

Edit:
1. Create packages/geospatial-skills/skills/d3-cartography/references/d3-projections.md.
   - Cheat sheet of D3 geo projections: name, d3 function, typical use case, rotation params, recommended scale range.
   - Cover: geoOrthographic, geoNaturalEarth1, geoMercator, geoAlbersUsa, geoEquirectangular, geoTransverseMercator, geoAzimuthalEqualArea, geoConicEqualArea, geoStereographic.
