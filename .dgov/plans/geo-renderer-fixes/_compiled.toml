[plan]
name = "geo-renderer-fixes"
source_mtime_max = "2026-04-15T17:56:04.632127Z"
sop_set_hash = ""

[tasks."tasks/globe-hardening.fix"]
summary = "Add fetch error handling, country name lookup, and cleanup to locator-globe"
prompt = """
Orient:
- Read packages/geo-renderer/src/tools/locator-globe.ts — the locator globe MCP tool.
- Three issues to fix:
  1. loadWorld() has no error handling — if CDN is down, it fails silently.
  2. highlight_country_id only accepts ISO 3166-1 numeric codes (e.g. "776" for Tonga). Users want to pass names like "Tonga" or ISO alpha-3 like "TON".
  3. Line 12 has an eslint-disable comment but we don't use eslint.

Edit:
1. In loadWorld(), wrap fetch in try/catch. On failure, throw with message: "Failed to load world atlas data — check network connection" including the original error message.
2. Add a COUNTRY_LOOKUP map (object literal) that maps common country names and ISO alpha-2/alpha-3 codes to ISO 3166-1 numeric codes. Cover at least: the ~50 most common countries plus all Pacific island nations. Add a new optional param `highlight_country` (string) that accepts a country name, alpha-2, or alpha-3 code. Keep `highlight_country_id` for backward compat. If both are provided, `highlight_country_id` wins. The lookup should be case-insensitive.
3. Remove the eslint-disable comment on line 12.

Verify:
- `cd packages/geo-renderer && npx tsc --noEmit` passes.
- `cd packages/geo-renderer && npx vitest run` passes.
"""
commit_message = "add fetch error handling and country name lookup to locator globe"
files.edit = ["packages/geo-renderer/src/tools/locator-globe.ts"]
files.read = ["packages/geo-renderer/test/globe.test.ts"]

[tasks."tasks/ogr2ogr-tool.add"]
summary = "Add ogr2ogr vector conversion MCP tool"
prompt = """
Orient:
- Read packages/geo-renderer/src/tools/gdal-inspect.ts — has runGdal() helper, gdal_inspect and gdal_convert tools.
- Read packages/geo-renderer/src/index.ts — tool registration entry point.
- We need a vector conversion tool wrapping ogr2ogr.

Edit:
1. Create packages/geo-renderer/src/tools/ogr2ogr.ts with a new tool `ogr2ogr_convert`:
   - Params: input_path (string), output_path (string), output_format (enum: "GeoJSON", "GPKG", "FlatGeobuf", "Shapefile", "CSV", "Parquet", default "GeoJSON"), target_crs (optional string, e.g. "EPSG:4326"), sql_filter (optional string — raw SQL passed via -sql), where_clause (optional string — passed via -where), clip_source (optional string — vector file for -clipsrc).
   - Build ogr2ogr args from params. Use -f for format (map "Shapefile" to "ESRI Shapefile", "Parquet" to "Parquet").
   - After conversion, run ogrinfo -so on output to verify and return the summary.
   - Reuse the runGdal helper by importing it. Move runGdal to a shared utils file if needed, or just import from gdal-inspect.

2. Register the new tool in packages/geo-renderer/src/index.ts.

Verify:
- `cd packages/geo-renderer && npx tsc --noEmit` passes.
- `cd packages/geo-renderer && npx vitest run` passes.
"""
commit_message = "add ogr2ogr vector conversion MCP tool"
files.create = ["packages/geo-renderer/src/tools/ogr2ogr.ts"]
files.edit = ["packages/geo-renderer/src/index.ts", "packages/geo-renderer/src/tools/gdal-inspect.ts"]
files.read = ["packages/geo-renderer/package.json"]

[tasks."tasks/wire-mcp.add"]
summary = "Add MCP config example and npm bin entry for easy wiring"
prompt = """
Orient:
- Read packages/geo-renderer/package.json — current config.
- Read packages/geo-renderer/src/index.ts — entry point.
- Users need to add geo-renderer to ~/.mcp.json to use it. We should make this easy.

Edit:
1. Add a "bin" field to packages/geo-renderer/package.json: "geo-renderer": "dist/index.js"
2. Add a shebang line (#!/usr/bin/env node) to the top of packages/geo-renderer/src/index.ts.
3. Create packages/geo-renderer/mcp.example.json showing the exact config to add to ~/.mcp.json:
   {
     "mcpServers": {
       "geo-renderer": {
         "command": "node",
         "args": ["/path/to/topos/packages/geo-renderer/dist/index.js"]
       }
     }
   }

Verify:
- `cd packages/geo-renderer && npx tsc --noEmit` passes.
- `cd packages/geo-renderer && npm run build` succeeds.
"""
commit_message = "add bin entry and MCP config example"
depends_on = ["tasks/ogr2ogr-tool.add"]
files.create = ["packages/geo-renderer/mcp.example.json"]
files.edit = ["packages/geo-renderer/package.json", "packages/geo-renderer/src/index.ts"]
